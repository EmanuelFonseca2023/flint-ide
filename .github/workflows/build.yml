name: Build Flint

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build MacOS App
        run: wails build -platform darwin/amd64
      - name: Create DMG
        run: |
          npm install --global create-dmg
          create-dmg build/bin/Flint.app build/bin/ || true
          mv build/bin/*.dmg build/bin/Flint-macOS.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Flint-macOS
          path: build/bin/Flint-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Download WinLibs
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/brechtsanders/winlibs_mingw/releases/download/14.2.0posix-19.1.1-12.0.0-ucrt-r2/winlibs-x86_64-posix-seh-gcc-14.2.0-mingw-w64ucrt-12.0.0-r2.zip" -OutFile winlibs.zip
          Expand-Archive winlibs.zip -DestinationPath build/windows/compiler
      - name: Build Windows EXE
        run: wails build -platform windows/amd64 -nsis
      - uses: actions/upload-artifact@v4
        with:
          name: Flint-Windows
          path: build/bin/*.exe

  build-linux:
    # CAMBIO CLAVE: Usamos 22.04 para recuperar la librería 4.0 y mayor compatibilidad de glibc
    runs-on: ubuntu-22.04 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          # En Ubuntu 22.04, la 4.0 SÍ existe y es la que Wails espera
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Linux
        run: wails build -platform linux/amd64
      - name: Package Linux
        run: |
          cd build/bin
          tar -czvf Flint-Linux-Portable.tar.gz Flint
      - uses: actions/upload-artifact@v4
        with:
          name: Flint-Linux
          path: |
            build/bin/Flint
            build/bin/Flint-Linux-Portable.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Flint-macOS/*.dmg
            Flint-Windows/*.exe
            Flint-Linux/Flint-Linux-Portable.tar.gz
            Flint-Linux/Flint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}