name: Build Flint (MSI + Crossplatform)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: choco install wixtoolset -y

      - name: Download WinLibs
        run: |
          curl -L -o winlibs.zip https://github.com/brechtsanders/winlibs_mingw/releases/download/15.2.0posix-14.0.0-ucrt-r7/winlibs-x86_64-posix-seh-gcc-15.2.0-llvm-14.0.0-mingw-w64ucrt-12.0.0-r7.zip
          powershell -Command "Expand-Archive winlibs.zip -DestinationPath build/bin/compiler"

      - name: Flatten compiler
        run: |
          move build\bin\compiler\mingw64 build\bin\compiler\toolchain

      - name: Build Wails App
        run: wails build -platform windows/amd64 -o Flint.exe

      - name: Prepare MSI structure
        run: |
          mkdir dist
          xcopy build\bin\Flint.exe dist\ /Y
          xcopy build\bin\compiler\toolchain\bin dist\compiler\bin\ /E /I /Y

      - name: Generate file list for WiX
        run: |
          dir dist\compiler\bin /b > files.txt

      - name: Create WiX source
        run: |
          echo ^<?xml version="1.0" encoding="UTF-8"?^> > installer.wxs
          echo ^<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi"^> >> installer.wxs
          echo   ^<Product Id="*" Name="Flint" Language="1033" Version="1.0.0" Manufacturer="Flint" UpgradeCode="EEE4B5AC-3E88-4109-9B1E-10C81E08AAEB"^> >> installer.wxs
          echo     ^<Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" /^> >> installer.wxs
          echo     ^<MediaTemplate /^> >> installer.wxs

          echo     ^<Feature Id="MainFeature" Title="Flint" Level="1"^> >> installer.wxs
          echo       ^<ComponentGroupRef Id="AppFiles" /^> >> installer.wxs
          echo     ^</Feature^> >> installer.wxs

          echo     ^<Directory Id="TARGETDIR" Name="SourceDir"^> >> installer.wxs
          echo       ^<Directory Id="ProgramFilesFolder"^> >> installer.wxs
          echo         ^<Directory Id="INSTALLDIR" Name="Flint"^> >> installer.wxs
          echo           ^<Directory Id="COMPILERDIR" Name="compiler"^> >> installer.wxs
          echo             ^<Directory Id="BINDIR" Name="bin" /^> >> installer.wxs
          echo           ^</Directory^> >> installer.wxs
          echo         ^</Directory^> >> installer.wxs
          echo       ^</Directory^> >> installer.wxs
          echo     ^</Directory^> >> installer.wxs

          echo     ^<DirectoryRef Id="INSTALLDIR"^> >> installer.wxs
          echo       ^<Component Id="MainExe" Guid="*"^> >> installer.wxs
          echo         ^<File Source="dist\\Flint.exe" /^> >> installer.wxs
          echo       ^</Component^> >> installer.wxs
          echo     ^</DirectoryRef^> >> installer.wxs

          echo     ^<DirectoryRef Id="BINDIR"^> >> installer.wxs

          for /f %%i in (files.txt) do (
            echo       ^<Component Id="cmp_%%~ni" Guid="*"^> >> installer.wxs
            echo         ^<File Source="dist\\compiler\\bin\\%%i" /^> >> installer.wxs
            echo       ^</Component^> >> installer.wxs
          )

          echo     ^</DirectoryRef^> >> installer.wxs

          echo     ^<ComponentGroup Id="AppFiles"^> >> installer.wxs
          echo       ^<ComponentRef Id="MainExe" /^> >> installer.wxs

          for /f %%i in (files.txt) do (
            echo       ^<ComponentRef Id="cmp_%%~ni" /^> >> installer.wxs
          )

          echo     ^</ComponentGroup^> >> installer.wxs

          echo     ^<DirectoryRef Id="INSTALLDIR"^> >> installer.wxs
          echo       ^<Component Id="EnvPath" Guid="*"^> >> installer.wxs
          echo         ^<Environment Id="PATH_VAR" Name="PATH" Value="[INSTALLDIR]compiler\\bin" Permanent="no" Part="last" Action="set" /^> >> installer.wxs
          echo       ^</Component^> >> installer.wxs
          echo     ^</DirectoryRef^> >> installer.wxs

          echo   ^</Product^> >> installer.wxs
          echo ^</Wix^> >> installer.wxs

      - name: Build MSI
        run: |
          candle installer.wxs
          light installer.wixobj -o Flint.msi

      - uses: softprops/action-gh-release@v2
        with:
          files: Flint.msi

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: wails build -platform linux/amd64

      - uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: wails build -platform darwin/universal

      - uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*