name: Build Flint (Stable CI)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install WiX
        run: choco install wixtoolset -y

      - name: Download WinLibs
        run: |
          curl -L -o winlibs.zip https://github.com/brechtsanders/winlibs_mingw/releases/latest/download/winlibs-x86_64-posix-seh-gcc.zip
          powershell -Command "Expand-Archive winlibs.zip -DestinationPath build/bin/compiler"

      - name: Normalize toolchain
        shell: powershell
        run: |
          $folder = Get-ChildItem build\bin\compiler | Where-Object { $_.PSIsContainer } | Select-Object -First 1
          Move-Item $folder.FullName build\bin\compiler\toolchain

      - name: Build app
        run: wails build -platform windows/amd64 -o Flint.exe

      - name: Prepare MSI files
        run: |
          mkdir dist
          xcopy build\\bin\\Flint.exe dist\\ /Y
          xcopy build\\bin\\compiler\\toolchain dist\\compiler\\ /E /I /Y

      - name: Create WiX file
        run: |
          echo ^<?xml version="1.0" encoding="UTF-8"?^> > installer.wxs
          echo ^<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi"^> >> installer.wxs
          echo ^<Product Id="*" Name="Flint" Language="1033" Version="1.2.5" Manufacturer="Flint" UpgradeCode="12345678-1234-1234-1234-123456789012"^> >> installer.wxs
          echo ^<Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" /^> >> installer.wxs
          echo ^<MediaTemplate /^> >> installer.wxs

          echo ^<Directory Id="TARGETDIR" Name="SourceDir"^> >> installer.wxs
          echo ^<Directory Id="ProgramFilesFolder"^> >> installer.wxs
          echo ^<Directory Id="INSTALLDIR" Name="Flint" /^> >> installer.wxs
          echo ^</Directory^> >> installer.wxs
          echo ^</Directory^> >> installer.wxs

          echo ^<DirectoryRef Id="INSTALLDIR"^> >> installer.wxs
          echo ^<Component Id="MainExe" Guid="*"^> >> installer.wxs
          echo ^<File Source="dist\\Flint.exe" /^> >> installer.wxs
          echo ^</Component^> >> installer.wxs

          echo ^<Component Id="EnvPath" Guid="*"^> >> installer.wxs
          echo ^<Environment Id="PATH_VAR" Name="PATH" Value="[INSTALLDIR]compiler" Permanent="no" Part="last" Action="set" /^> >> installer.wxs
          echo ^</Component^> >> installer.wxs
          echo ^</DirectoryRef^> >> installer.wxs

          echo ^<Feature Id="MainFeature" Level="1"^> >> installer.wxs
          echo ^<ComponentRef Id="MainExe" /^> >> installer.wxs
          echo ^<ComponentRef Id="EnvPath" /^> >> installer.wxs
          echo ^</Feature^> >> installer.wxs

          echo ^</Product^> >> installer.wxs
          echo ^</Wix^> >> installer.wxs

      - name: Build MSI
        run: |
          candle installer.wxs
          light installer.wixobj -o Flint.msi

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Flint.msi
            build/bin/Flint.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libglib2.0-dev \
            build-essential

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        run: wails build -platform linux/amd64

      - name: Upload Linux
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS
        run: wails build -platform darwin/universal

      - name: Upload macOS
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*