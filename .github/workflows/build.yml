name: Build Flint Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS App
        run: wails build -platform darwin/${{ matrix.arch }} -o Flint

      - name: Create tar.gz
        run: |
          cd build/bin
          tar -czvf Flint-macOS-${{ matrix.arch }}.app.tar.gz Flint.app

      - name: Create DMG
        run: |
          npm install --global create-dmg
          create-dmg build/bin/Flint.app build/bin/ || true
          mv build/bin/*.dmg build/bin/Flint-macOS-${{ matrix.arch }}.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Flint-macOS-${{ matrix.arch }}
          path: |
            build/bin/Flint-macOS-*.dmg
            build/bin/Flint-macOS-*.tar.gz

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Download & Extract WinLibs
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/brechtsanders/winlibs_mingw/releases/download/14.2.0posix-19.1.1-12.0.0-ucrt-r2/winlibs-x86_64-posix-seh-gcc-14.2.0-mingw-w64ucrt-12.0.0-r2.zip" `
            -OutFile winlibs.zip
          # Extraer dentro de build/bin/compiler
          New-Item -ItemType Directory -Force -Path build/bin/compiler
          Expand-Archive winlibs.zip -DestinationPath build/bin/compiler

      - name: Add WinLibs to NSIS template
        shell: pwsh
        run: |
          # Modificar el template de NSIS antes de que Wails haga el build
          $nsiPath = "build/windows/installer/project.nsi"
          $content  = Get-Content $nsiPath -Raw
          
          # Buscar el bloque de instalación y añadir el compilador después del exe
          $inject = "`r`n  ; WinLibs (compilador bundleado)`r`n  SetOutPath `"`$INSTDIR\compiler`"`r`n  File /r `"`${BUILD_DIR}\compiler\*`"`r`n"
          $content  = $content -replace '(File "\${BUILD_DIR}\\[^"]+\.exe")', "`$1$inject"
          
          Set-Content $nsiPath $content

      - name: Build Windows EXE + NSIS Installer
        run: wails build -platform windows/amd64 -nsis -o Flint.exe

      - uses: actions/upload-artifact@v4
        with:
          name: Flint-Windows
          path: build/bin/*.exe

  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            build-essential pkg-config \
            ruby ruby-dev rubygems
          sudo gem install fpm

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux Binary
        run: wails build -platform linux/amd64 -o Flint

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package (tar.gz + deb + rpm)
        run: |
          cd build/bin
          tar -czvf Flint-Linux-x64-Portable.tar.gz Flint
          fpm -s dir -t deb -n flint \
            -v ${{ steps.get_version.outputs.VERSION }} \
            --prefix /usr/local/bin Flint
          fpm -s dir -t rpm -n flint \
            -v ${{ steps.get_version.outputs.VERSION }} \
            --prefix /usr/local/bin Flint

      - uses: actions/upload-artifact@v4
        with:
          name: Flint-Linux
          path: |
            build/bin/*.tar.gz
            build/bin/*.deb
            build/bin/*.rpm

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten structure
        run: |
          mkdir -p release_assets
          find artifacts -type f -exec mv {} release_assets/ \;

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}